name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Creer fichier .env
        run: |
          echo "DB_HOST=mysql" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "REDIS_DB=${{ secrets.REDIS_DB }}" >> .env

      - name: Create Docker network
        run: docker network create labo05-network || true

      - name: Build and start services
        run: |
          docker compose up -d --build store_manager mysql redis

      - name: Wait for MySQL and Redis
        run: |
          docker compose exec -T store_manager python - <<'PY'
          import time
          from sqlalchemy import text
          from db import get_sqlalchemy_session, get_redis_conn

          deadline = time.time() + 90

          while time.time() < deadline:
              try:
                  session = get_sqlalchemy_session()
                  session.execute(text("SELECT 1"))
                  session.close()

                  get_redis_conn().ping()

                  print("MySQL and Redis are ready.")
                  break
              except Exception as e:
                  print(e)
                  time.sleep(2)
          else:
              raise Exception("MySQL or Redis not ready")
          PY

      - name: Run tests
        run: |
          docker compose exec -T store_manager pytest

      - name: Cleanup
        if: always()
        run: docker compose down -v